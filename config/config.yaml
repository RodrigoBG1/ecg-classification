data:
  path: "ptb-xl-a-large-publicly-available-electrocardiography-dataset-1.0.3"
  sampling_rate: 500
  n_leads: 12
  signal_length: 5000
  classes: [NORM, MI, STTC, CD, HYP]

training:
  batch_size: 32
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001
  num_workers: 2
  mixup_alpha: 0.4
  grad_clip_norm: 1.0
  label_smoothing: 0.1
  warmup_epochs: 5

model:
  n_classes: 5
  drop_path_rate: 0.3.

cnn_transformer:
  n_classes:       5
  d_model:         256
  n_heads:         8
  n_layers:        4
  ffn_dim:         1024
  dropout:         0.1
  drop_path_rate:  0.1
  drop_path_rate: 0.3

patchtst:
  n_classes: 5
  d_model: 256
  n_heads: 8
  n_layers: 6
  ff_dim: 1024
  attn_dropout: 0.1
  dropout: 0.1
